name: Prevent PRs Targeting Master

on:
  pull_request:

jobs:
  block-master:
    name: Block PRs to master
    runs-on: ubuntu-latest
    steps:
      - name: Check PR base branch
        run: |
          base_ref="${{ github.event.pull_request.base.ref }}"
          echo "PR base branch: $base_ref"
          if [ "$base_ref" = "master" ]; then
            echo "Pull requests must target 'dev' first. Blocking this PR."
            exit 1
          fi