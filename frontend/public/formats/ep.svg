<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" aria-labelledby="ep-title ep-desc" role="img">
  <title id="ep-title">EP (vinyl)</title>
  <desc id="ep-desc">Stylised vinyl disc representing an EP with a green centre label.</desc>

  <!-- Outer disc -->
  <circle cx="50" cy="50" r="48" fill="#111" stroke="#333" stroke-width="1"/>

  <!-- 4 grooves -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#222" stroke-width="0.5"/>
  <circle cx="50" cy="50" r="36" fill="none" stroke="#222" stroke-width="0.5"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#222" stroke-width="0.5"/>
  <circle cx="50" cy="50" r="24" fill="none" stroke="#222" stroke-width="0.5"/>

  <!-- Green centre label -->
  <circle cx="50" cy="50" r="16" fill="#10b981"/>

  <!-- Centre hole -->
  <circle cx="50" cy="50" r="3" fill="#111"/>
</svg>
